<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultar agendamento - Cabeleleila Leila</title>

  <link rel="icon" type="image/svg+xml" href="./assets/img/IconLogo.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./style/global.css" />
  <link rel="stylesheet" href="./style/components.css" />
  <link rel="stylesheet" href="./style/pages/consultar-agendamento.css" />
</head>
<body>
  <header class="header">
    <div class="container header__content">
      <a href="./index.html" class="logo-link">
        <h1 class="logo">Cabeleleila Leila</h1>
        <p class="logo-subtitle">Salão de Beleza</p>
      </a>

      <div class="header__actions">
        <a href="./agendamento.html" class="btn btn-light">Agendar</a>
        <a href="./index.html" class="btn btn-outline">Voltar</a>
      </div>

      <button class="menu-toggle" id="menu-toggle" type="button" aria-label="Abrir menu">
        <span class="menu-toggle__icon">⋮</span>
        <span class="menu-toggle__text">Menu</span>
      </button>

      <div class="mobile-menu" id="mobile-menu">
        <a href="./agendamento.html">Agendar</a>
        <a href="./index.html" class="btn btn-outline">Voltar</a>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="page-top">
        <span class="section-tag">Consulta</span>
        <h2 class="section-title">Consultar agendamento</h2>
        <p class="section-description">
          Informe seu e-mail para visualizar os seus agendamentos.
        </p>
      </div>

      <section class="consulta-layout">
        <div class="card">
          <h3 class="block-title">Buscar por e-mail</h3>

          <div class="form-group">
            <label for="consulta-email">E-mail</label>
            <input
              id="consulta-email"
              type="email"
              class="input"
              placeholder="Digite o e-mail usado no agendamento"
            />
          </div>

          <button id="btn-consultar" class="btn btn-primary btn-full" type="button">
            Consultar
          </button>

          <p id="mensagem-consulta" class="message-box"></p>
        </div>

        <div class="card">
          <h3 class="block-title">Seus agendamentos</h3>

          <div id="consulta-lista" class="consulta-lista">
            <p>Digite seu e-mail para consultar.</p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="modal-editar-consulta" class="modal hidden">
  <div class="modal__overlay"></div>

  <div class="modal__content card">
    <div class="modal__top">
      <h3 class="block-title">Alterar agendamento</h3>
      <button id="btn-fechar-modal-consulta" class="btn btn-outline btn-sm" type="button">
        Fechar
      </button>
    </div>

    <div class="form-group">
      <label for="editar-consulta-data">Nova data</label>
      <input id="editar-consulta-data" type="date" class="input" />
    </div>

    <div class="form-group">
      <label for="editar-consulta-horario">Novo horário</label>

      <select id="editar-consulta-horario" class="input">
        <option value="">Selecione um horário</option>
        <option value="09:00">09:00</option>
        <option value="10:00">10:00</option>
        <option value="11:00">11:00</option>
        <option value="13:00">13:00</option>
        <option value="14:00">14:00</option>
        <option value="15:00">15:00</option>
        <option value="16:00">16:00</option>
        <option value="17:00">17:00</option>
      </select>
    </div>

    <div class="modal__actions">
      <button id="btn-salvar-edicao-consulta" class="btn btn-primary" type="button">
        Salvar alteração
      </button>
    </div>

    <p id="mensagem-edicao-consulta" class="message-box"></p>
  </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./script/supabase.js"></script>
  <script src="./script/menu.js"></script>
  <script src="./script/consultar-agendamento.js"></script>
</body>
</html>
