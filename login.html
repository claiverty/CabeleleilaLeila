<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Cabeleleila Leila</title>

  <link rel="icon" type="image/svg+xml" href="./assets/img/IconLogo.svg"/>
  <link rel="stylesheet" href="./style/global.css" />
  <link rel="stylesheet" href="./style/components.css" />
  <link rel="stylesheet" href="./style/pages/login.css" />
   <link rel="stylesheet" href="https://boxicons.com/">
</head>
<body>
<body>

  <header class="login-header">
    <a href="./index.html" class="login-back">
      <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
fill="#e91e63" viewBox="0 0 24 24" >
<path d="M21 8h-7V4a1.004 1.004 0 0 0-1.63-.78l-9.99 8c-.24.19-.38.48-.38.78s.14.59.38.78l10 8c.18.14.4.22.62.22.15 0 .3-.03.43-.1.35-.17.57-.52.57-.9v-4h7c.55 0 1-.45 1-1V9c0-.55-.45-1-1-1"/>
</svg> Voltar
    </a>

    <a href="./index.html" class="logo-link">
        <h1 class="logo">Cabeleleila Leila</h1>
        <p class="logo-subtitle">Salão de Beleza</p>
      </a>
  </header>

  <main class="login">
    <div class="login-card card">
      <h2 class="block-title">Área administrativa</h2>

      <div class="form-group">
        <label>Email</label>
        <input id="login-email" type="email" class="input" />
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input id="login-senha" type="password" class="input" />
      </div>

      <button id="btn-login" class="btn btn-primary btn-full">
        Entrar
      </button>

      <p id="mensagem-login" class="message-box"></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./script/supabase.js"></script>
  <script src="./script/login.js"></script>
</body>
</html>
